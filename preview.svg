<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0088cc;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="#080b14"/>
  <!-- Stars -->
  <circle cx="120" cy="80" r="1" fill="rgba(255,255,255,0.4)"/>
  <circle cx="340" cy="140" r="1.5" fill="rgba(200,220,255,0.5)"/>
  <circle cx="560" cy="60" r="1" fill="rgba(255,255,255,0.3)"/>
  <circle cx="780" cy="180" r="1.2" fill="rgba(200,220,255,0.4)"/>
  <circle cx="950" cy="90" r="1" fill="rgba(255,255,255,0.35)"/>
  <circle cx="200" cy="300" r="0.8" fill="rgba(255,255,255,0.25)"/>
  <circle cx="450" cy="400" r="1" fill="rgba(255,255,255,0.3)"/>
