  <text x="80" y="310" font-family="sans-serif" font-size="48" font-weight="800" fill="#e8eaf6">Your AI OS.</text>
  <text x="80" y="370" font-family="sans-serif" font-size="32" font-weight="600" fill="rgba(0,212,255,0.6)">Locally Governed.</text>
  <text x="80" y="430" font-family="monospace" font-size="20" fill="#00d4ff">pcbrain.ai</text>
  <!-- Right: mini dashboard mockup -->
  <rect x="720" y="160" width="400" height="300" rx="12" fill="#0f1117" stroke="rgba(0,212,255,0.2)" stroke-width="1"/>
  <!-- Chrome bar -->
  <rect x="720" y="160" width="400" height="28" rx="12" fill="#1a1d28"/>
  <rect x="720" y="176" width="400" height="12" fill="#1a1d28"/>
  <circle cx="736" cy="174" r="4" fill="#ff5f57"/>
  <circle cx="750" cy="174" r="4" fill="#ffbd2e"/>
  <circle cx="764" cy="174" r="4" fill="#28c840"/>
  <!-- Tiles -->
  <rect x="735" y="200" width="180" height="80" rx="6" fill="rgba(255,255,255,0.03)" stroke="rgba(0,212,255,0.1)" stroke-width="1"/>
  <rect x="925" y="200" width="180" height="80" rx="6" fill="rgba(255,255,255,0.03)" stroke="rgba(0,212,255,0.1)" stroke-width="1"/>
  <rect x="735" y="290" width="180" height="80" rx="6" fill="rgba(255,255,255,0.03)" stroke="rgba(0,212,255,0.1)" stroke-width="1"/>
  <rect x="925" y="290" width="180" height="80" rx="6" fill="rgba(255,255,255,0.03)" stroke="rgba(0,212,255,0.1)" stroke-width="1"/>
  <!-- Health ring -->
  <circle cx="785" cy="240" r="22" fill="none" stroke="#00d4ff" stroke-width="3"/>
  <text x="785" y="246" font-family="monospace" font-size="14" font-weight="800" fill="#00d4ff" text-anchor="middle">100</text>
