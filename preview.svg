  <text x="970" y="227" font-family="sans-serif" font-size="9" font-weight="700" fill="#00ff88" text-anchor="middle">ACTIVE</text>
  <!-- Bottom cyan line -->
  <rect x="0" y="620" width="1200" height="10" fill="url(#cyanGrad)" opacity="0.6"/>
  <!-- Patent line -->
  <text x="80" y="580" font-family="sans-serif" font-size="14" fill="rgba(255,255,255,0.25)">Patent pending · © 2026 Melchiorre Oliva</text>
